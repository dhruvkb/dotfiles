#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
	{ id = "trailing-whitespace", args = [
		"--markdown-linebreak-ext=md",
	] },
	{ id = "end-of-file-fixer" },
	{ id = "check-json", exclude = "^(\\.vscode|Code|zed)/.*\\.json|.oxlintrc\\.json|.oxfmtrc\\.json|tsconfig\\.json$" },
	{ id = "check-toml" },
	{ id = "check-yaml" },
	{ id = "mixed-line-ending", args = [
		"--fix=lf",
	] },
	{ id = "check-symlinks" },
	{ id = "destroyed-symlinks" },
	{ id = "check-merge-conflict" },
	{ id = "detect-private-key" },
	{ id = "check-shebang-scripts-are-executable" },
	{ id = "check-executables-have-shebangs" },
]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker"
rev = "v3.7.0"
hooks = [{ id = "editorconfig-checker", exclude = "^.*\\.plist$" }]

[[repos]]
repo = "https://github.com/afadesigns/zshellcheck"
rev = "v1.2.2"
hooks = [{ id = "zshellcheck" }]

[[repos]]
repo = "https://github.com/scop/pre-commit-shfmt"
rev = "v3.13.1-1"
hooks = [{ id = "shfmt" }]

[[repos]]
repo = "https://github.com/JohnnyMorganz/StyLua"
rev = "v2.5.2"
hooks = [{ id = "stylua-github" }]

[[repos]]
repo = "local"
hooks = [
	# Oxc
	{ id = "oxlint", name = "Oxlint", entry = "pnpm lint:fix", language = "system", types_or = [
		"javascript",
		"ts",
	] },
	{ id = "oxfmt", name = "Oxfmt", entry = "pnpm format", language = "system", types_or = [
		"javascript",
		"json",
		"markdown",
		"toml",
		"ts",
		"yaml",
	], args = [
		# Since there are some files which match `types_or` but are ignored by
		# `.oxfmtrc.json`, we need to silence the error raised when the staged
		# change only has the ignored files.
		"--no-error-on-unmatched-pattern",
	] },
]
