[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace", args = [
        "--markdown-linebreak-ext=md",
    ] },
    { id = "end-of-file-fixer" },
    { id = "check-json", exclude = "^(.vscode|Code|zed)/.*\\.json$" },
    { id = "check-toml" },
    { id = "check-yaml" },
    { id = "check-case-conflict" },
    { id = "check-merge-conflict" },
    { id = "check-symlinks" },
    { id = "mixed-line-ending" },
    { id = "check-shebang-scripts-are-executable" },
    { id = "check-executables-have-shebangs" },
]

[[repos]]
repo = "https://github.com/afadesigns/zshellcheck"
rev = "v1.2.2"
hooks = [{ id = "zshellcheck" }]

[[repos]]
repo = "https://github.com/scop/pre-commit-shfmt"
rev = "v3.13.1-1"
hooks = [{ id = "shfmt" }]

[[repos]]
repo = "https://github.com/JohnnyMorganz/StyLua"
rev = "v2.5.2"
hooks = [{ id = "stylua-github" }]

[[repos]]
repo = "local"
hooks = [
    { id = "oxlint", name = "Oxlint", entry = "pnpm lint:fix", language = "system", types_or = [
        "javascript",
    ] },
    { id = "oxfmt", name = "Oxfmt", entry = "pnpm format", language = "system", types_or = [
        "javascript",
        "json",
        "markdown",
        "toml",
        "yaml",
    ] },
]
