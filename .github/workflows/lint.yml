name: Lint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel superseded runs on the same ref (PRs only; never cancel `main` pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Run lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup `just`
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Enable Corepack
        run: corepack enable pnpm

      # `prek` and the `oxlint`/`oxfmt` hooks run via `pnpm exec`.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: just install

      - name: Run lint
        run: just lint
