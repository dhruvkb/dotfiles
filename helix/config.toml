# CAUTION: Symlinked file!
# ORIGINAL: `dotfiles/helix/config.toml`

theme = "catppuccin_mocha"

[editor]
rulers = [80, 120]
cursorline = true
color-modes = true

[editor.auto-save]
focus-lost = true

[editor.file-picker]
hidden = false

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[keys.normal]
"$" = "goto_line_end"
"^" = "goto_first_nonwhitespace"
G = "goto_file_end"
C-s = ":w"
"C-d" = ":wq"
"C-," = ":open ~/dotfiles/helix/config.toml"
